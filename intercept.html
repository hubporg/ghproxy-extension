<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Accelerator - 下载加速</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-width: 320px;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #ffffff;
      color: #333;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 24px 20px 20px;
      border-bottom: 1px solid #eaeaea;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    @media (min-width: 768px) {
      .title {
        font-size: 28px;
      }
    }

    .title .normal {
      color: #24292e;
    }

    .title .highlight {
      color: #155DFC;
    }

    .subtitle {
      font-size: 12px;
      color: #666;
      text-align: center;
      line-height: 1.5;
    }

    @media (min-width: 768px) {
      .subtitle {
        font-size: 13px;
      }
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    @media (min-width: 768px) {
      .content {
        padding: 24px;
        max-width: 600px;
        margin: 0 auto;
        width: 100%;
      }
    }

    .section {
      margin-bottom: 20px;
    }

    .section-label {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .link-info {
      background: #f8f9fa;
      border: 1px solid #eaeaea;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .info-label {
      font-size: 11px;
      color: #666;
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    @media (min-width: 768px) {
      .info-label {
        font-size: 12px;
      }
    }

    .info-url {
      font-size: 11px;
      color: #333;
      word-break: break-all;
      line-height: 1.5;
      font-family: 'Consolas', 'Monaco', monospace;
    }

    @media (min-width: 768px) {
      .info-url {
        font-size: 12px;
      }
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    @media (max-width: 480px) {
      .button-group {
        flex-direction: column;
      }
    }

    .btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
    }

    @media (max-width: 480px) {
      .btn {
        padding: 14px 16px;
      }
    }

    .btn-primary {
      background: #155DFC;
      color: white;
    }

    .btn-primary:hover {
      background: #0d4bb5;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .options {
      background: #f8f9fa;
      border: 1px solid #eaeaea;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .option-title {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .option-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      font-size: 13px;
      color: #555;
    }

    .option-item:first-child {
      padding-top: 0;
    }

    .option-item:last-child {
      padding-bottom: 0;
    }

    .option-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .option-item label {
      cursor: pointer;
      flex: 1;
      line-height: 1.5;
    }

    .option-hint {
      margin-left: 24px;
      font-size: 11px;
      color: #888;
      line-height: 1.4;
    }

    @media (min-width: 768px) {
      .option-hint {
        font-size: 12px;
      }
    }

    .notice {
      background: #fff8e1;
      border-left: 4px solid #ffc107;
      padding: 12px 14px;
      margin-top: 16px;
      border-radius: 4px;
      font-size: 11px;
      color: #666;
      line-height: 1.6;
    }

    @media (min-width: 768px) {
      .notice {
        font-size: 12px;
      }
    }

    .notice-icon {
      display: inline-block;
      margin-right: 4px;
    }

    .footer {
      padding: 16px 20px;
      text-align: center;
      font-size: 11px;
      color: #999;
      border-top: 1px solid #eaeaea;
    }

    @media (min-width: 768px) {
      .footer {
        padding: 16px 24px;
      }
    }

    .footer a {
      color: #0d4bb5;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .countdown {
      text-align: center;
      font-size: 12px;
      color: #666;
      margin-top: 12px;
      padding: 10px;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 4px;
    }

    .countdown strong {
      color: #155DFC;
      font-weight: 600;
    }

    .hidden {
      display: none;
    }

    .location-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 12px;
      margin-bottom: 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }

    .location-status-cn {
      background: #e3f9e5;
      color: #1a7f37;
      border: 1px solid #2da44e;
    }

    .location-status-global {
      background: #fff8e1;
      color: #9a6700;
      border: 1px solid #f59e0b;
    }

    .location-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="title">
      <span class="normal">Github</span> <span class="highlight">Accelerator</span>
    </div>
    <div class="subtitle">智能 GitHub 下载加速器 · 302 重定向模式 · IDM 完美兼容</div>
  </div>

  <div class="content">
    <div class="section">
      <div class="location-status" id="location-status">
        <span class="location-spinner"></span>
        <span id="location-text">检测代理状态中...</span>
      </div>

      <div class="section-label">
        📥 下载链接：
      </div>

      <div class="link-info">
        <div class="info-label">原始链接：</div>
        <div class="info-url" id="original-url">加载中...</div>
      </div>

      <div class="button-group">
        <a href="#" class="btn btn-primary" id="accelerate-btn">
          ⚡ 使用加速链接
        </a>
        <a href="#" class="btn btn-secondary" id="direct-btn">
          🌐 直接访问
        </a>
        <button type="button" class="btn btn-secondary" id="back-btn" style="flex: 0 0 auto; padding: 10px 16px;">
          ← 返回
        </button>
      </div>

      <div class="countdown hidden" id="countdown">
        将在 <strong id="timer">10</strong> 秒后自动使用加速链接...
      </div>

      <div class="options">
        <div class="option-title">⚙️ 下载偏好设置</div>

        <div class="option-item">
          <input type="checkbox" id="always-accelerate" />
          <label for="always-accelerate">
            <strong>始终使用加速链接</strong>
          </label>
        </div>
        <div class="option-hint">
          启用后，所有 GitHub 下载将自动使用加速链接，不再显示此页面
        </div>
      </div>

      <div class="notice">
        <span class="notice-icon">💡</span>
        公益服务，请勿滥用。自动选择最优代理节点加速 GitHub 资源下载。
        <br>
        支持 Releases、Archive、Raw、Code Download 等所有下载场景。
      </div>
    </div>
  </div>

  <div class="footer">
    302 重定向 + 智能域名转换 · Powered By <a style="color: #0d4bb5;text-decoration: none;" href="https://www.hubp.org"
      target="_blank">hubp.org</a>
  </div>

  <script src="intercept.js"></script>
</body>

</html>
